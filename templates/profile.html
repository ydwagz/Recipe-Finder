{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}
<section class="form-panel profile-panel shadow-lg">
    <span class="section-kicker">Profile</span>
    <h1>{{ profile["username"] }}</h1>
    {% if profile["img"] %}
    <img class="profile-image" src="/static/images/{{ profile['img'] }}" alt="{{ profile['username'] }}">
    {% endif %}
</section>
{% endblock %}
